services:
  emulator-service:
    container_name: emulator-service
    build:
      context: emulator-service
      dockerfile: Dockerfile
    environment:
      BACKEND_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "7071:7071"
    networks:
      - internet-map
    restart: unless-stopped

  internet-map:
    container_name: internet-map
    build:
      context: internet-map
      dockerfile: Dockerfile
    depends_on:
      - emulator-service
    ports:
      - "8080:80"
      - "8081:8081"
    networks:
      - internet-map
    restart: unless-stopped

  satellite-emulator:
    container_name: satellite-emulator
    build:
      context: satellite-emulator
      dockerfile: Dockerfile
    depends_on:
      - emulator-service
    ports:
      - "9090:80"
      - "9091:9091"
    networks:
      - internet-map
    restart: unless-stopped

  traffic-observer:
    container_name: traffic-observer
    build:
      context: .
      dockerfile: traffic-observer/Dockerfile
    privileged: true
    pid: host
    network_mode: host
    environment:
      TRAFFIC_INTERFACES: ${TRAFFIC_INTERFACES:-}
      TRAFFIC_FALLBACK_INTERFACES: ${TRAFFIC_FALLBACK_INTERFACES:-docker0}
      TRAFFIC_ONLY_SEED_CONTAINERS: ${TRAFFIC_ONLY_SEED_CONTAINERS:-true}
      TRAFFIC_DISCOVERY_CONCURRENCY: ${TRAFFIC_DISCOVERY_CONCURRENCY:-32}
      TRAFFIC_FILTER: ${TRAFFIC_FILTER:-}
      TRAFFIC_CONTROL_ADDR: ${TRAFFIC_CONTROL_ADDR:-:19092}
      EMULATOR_SERVICE_TRAFFIC_URL: ${EMULATOR_SERVICE_TRAFFIC_URL:-}
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /lib/modules:/lib/modules:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    # profiles:
    #   - observer

networks:
  internet-map:
    driver: bridge
